{% if pipedin %}
    <div class="alert alert-success d-flex align-items-center" role="alert">
        <i class="bi bi-check-circle-fill me-2 fs-5"></i>
        <div class="flex-grow-1">
            <strong>Berhasil!</strong> Sudah login dengan akun KRISNA {{ pipedin }}.
        </div>
        <a class="btn btn-sm btn-success ms-3" href="/gov2pipe/pipedin/logout">Logout</a>
    </div>
{% else %}
    <div class="alert alert-danger d-flex align-items-center" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2 fs-5"></i>
        <div class="flex-grow-1">
            <strong>Belum login.</strong> Silahkan login ke KRISNA terlebih dahulu.
        </div>
        <a class="btn btn-sm btn-danger ms-3" href="/gov2pipe">Login</a>
    </div>
{% endif %}
