<style>
.readme-content table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 1rem;
}
.readme-content th,
.readme-content td {
  border: 1px solid var(--bs-border-color, #dee2e6);
  padding: 0.625rem 0.75rem;
  vertical-align: top;
}
.readme-content thead th {
  background-color: var(--bs-tertiary-bg, #f8f9fa);
  font-weight: 600;
}
.readme-content tbody tr:hover {
  background-color: var(--bs-tertiary-bg, #f8f9fa);
}
</style>

<div class="p-4">
  {% if readmeHtml %}
    <div class="readme-content">
      {{ readmeHtml|raw }}
    </div>
  {% else %}
    <p class="text-muted">Tidak ada README.md</p>
  {% endif %}
</div>
