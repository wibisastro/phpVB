<div class="p-4">
  <h4 class="mb-3"><i class="fas fa-code me-2"></i>{{ filename }}.json</h4>
  <div id="json-output" class="card card-body bg-light"></div>
  <script type="application/json" id="json-data">{{ content|raw }}</script>
</div>

<script src="https://cdn.jsdelivr.net/npm/json-formatter-js@2.5.1/dist/json-formatter.umd.min.js"></script>

<script>
(function(){
  const out = document.getElementById('json-output');
  try {
    const raw = document.getElementById('json-data').textContent;
    const data = JSON.parse(raw);
    const formatter = new JSONFormatter(data, 2, { theme: 'default', hoverPreviewEnabled: true });
    out.appendChild(formatter.render());
  } catch(e) {
    out.innerHTML = '<div class="alert alert-danger mb-0">JSON tidak valid: ' + e.message + '</div>';
  }
})();
</script>
