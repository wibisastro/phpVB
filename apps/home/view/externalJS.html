<!-- Layout Guide: warna background + label per area -->
<style>
/* Label badge */
.lg-label {
  display: inline-block;
  color: #fff;
  font-size: 10px;
  font-family: 'Courier New', monospace;
  padding: 2px 8px;
  border-radius: 3px;
  position: absolute;
  z-index: 100;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  white-space: nowrap;
}

/* Sidebar — ungu muda */
#sidebar.sidebar-wrapper {
  background: rgba(91,79,185,0.08) !important;
  outline: 2px dashed rgba(91,79,185,0.4) !important;
  outline-offset: -2px;
}
.app-brand {
  background: rgba(91,79,185,0.12) !important;
  border-radius: 8px;
}
.sidebarMenuScroll {
  background: rgba(91,79,185,0.05) !important;
}

/* Header — oranye muda */
.app-header {
  background: rgba(230,126,34,0.1) !important;
  outline: 2px dashed rgba(230,126,34,0.4) !important;
  outline-offset: -2px;
  position: relative;
}

/* Content — hijau muda */
.app-body {
  background: rgba(39,174,96,0.06) !important;
  outline: 2px dashed rgba(39,174,96,0.4) !important;
  outline-offset: -2px;
  position: relative;
}

/* Footer — abu muda */
.app-footer {
  background: rgba(127,140,141,0.1) !important;
  outline: 2px dashed rgba(127,140,141,0.4) !important;
  outline-offset: -2px;
  position: relative;
}

/* Offcanvas side panel — biru muda */
#sidePanelOffcanvas .offcanvas-body {
  background: rgba(41,128,185,0.06) !important;
}
</style>

<script>
(function() {
  function addLabel(selector, text, bg, top, right) {
    var el = document.querySelector(selector);
    if (!el) return;
    el.style.position = 'relative';
    var lbl = document.createElement('div');
    lbl.className = 'lg-label';
    lbl.style.background = bg;
    lbl.style.top = top;
    lbl.style.right = right;
    lbl.textContent = text;
    el.appendChild(lbl);
  }

  addLabel('#sidebar', 'sidebar', 'rgba(91,79,185,0.85)', '8px', '8px');
  addLabel('.app-brand', 'app-brand', 'rgba(91,79,185,0.65)', '4px', '4px');
  addLabel('.sidebarMenuScroll', 'block sidebar', 'rgba(91,79,185,0.65)', '4px', '4px');
  addLabel('.app-header', 'block header — cubeHeader.html', 'rgba(230,126,34,0.85)', '4px', '8px');
  addLabel('.app-body', 'block content', 'rgba(39,174,96,0.85)', '8px', '8px');
  addLabel('.app-footer', 'block footer — cubeFooter.html', 'rgba(127,140,141,0.85)', '4px', '8px');
})();
</script>
