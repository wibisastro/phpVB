<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
	<link type="image/x-icon" href="{{ webroot }}/images/logo-krisna.png" rel="shortcut icon" />
	<title>{{ pageTitle }}</title>

	<!-- Cube Theme CSS -->
	<link rel="stylesheet" href="{{ webroot }}/cube/fonts/bootstrap-icons.min.css" />
	<link rel="stylesheet" href="{{ webroot }}/cube/css/main.min.css" />

	<!-- phpVB core bundle CSS (Vue 3 komponen inti) -->
	<link type="text/css" rel="stylesheet" href="{{ webroot }}/dist/style.css?v=5.1.2" />

	<!-- Google Fonts -->
	<link href='//fonts.googleapis.com/css?family=Open+Sans:400,600,700,300' rel='stylesheet' type='text/css'>

	<!-- phpVB core bundle: Vue 3 + mitt eventBus + vue3-sfc-loader + komponen inti -->
	<script src="{{ webroot }}/dist/main.js?v=5.1.2"></script>
	<script src="{{ webroot }}/js/axios.min.js"></script>
	<script>
	(function(){
	    var baseURL = "{{ protocol }}://{{ _SERVER.SERVER_NAME }}";
	    axios.defaults.baseURL = baseURL;
	    axios.interceptors.request.use(function(config) {
	        if (config.url && !config.url.match(/^https?:\/\//)) {
	            if (config.url.charAt(0) !== '/') {
	                config.url = '/' + config.url;
	            }
	        }
	        return config;
	    });
	})();
	</script>
</head>

<body>
	<div id="app">
		{% block notification %} {% endblock %}
		<div class="container">
			{% block content %} {% endblock %}
			{% block footer %} {% endblock %}
		</div>
	</div>

{# Fallback path per-portal sudah default di vue3-sfc-loader adaptor (dist/main.js). #}
{% block customVueLoader %}{% endblock %}

<script>
  phpvb.createPageApp({
	{% block js %}
	    el: '#app',
	    components: {
	    {% for component in components %}
	        {% for item in component %}
	       '{{ item.tag }}': httpVueLoader('{{ webroot }}/{{ item.pageID }}/vue/{{ item.component }}'),
		   {% endfor %}
	    {% endfor %}
	    },
	{% endblock %}
  });
</script>

{% block externalJS %}

{% endblock %}

</body>
</html>
