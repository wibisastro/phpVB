<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
	<link type="image/x-icon" href="{{ webroot }}/images/logo-krisna.png" rel="shortcut icon" />
	<title>{{ pageTitle }}</title>

	<!-- Cube Theme CSS -->
	<link rel="stylesheet" href="{{ webroot }}/cube/fonts/bootstrap-icons.min.css" />
	<link rel="stylesheet" href="{{ webroot }}/cube/css/main.min.css" />

	<!-- BootstrapVue CSS -->
	<link type="text/css" rel="stylesheet" href="{{ webroot }}/css/bootstrap-vue.min.css" />

	<!-- Google Fonts -->
	<link href='//fonts.googleapis.com/css?family=Open+Sans:400,600,700,300' rel='stylesheet' type='text/css'>

	<!-- Vue and friends -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.6.11/vue.js"></script>
	<script src="{{ webroot }}/js/bootstrap-vue.min.js"></script>
	<script src="{{ webroot }}/js/httpVueLoader.js"></script>
	<script src="{{ webroot }}/js/axios.min.js"></script>
	<script>
	(function(){
	    var baseURL = "{{ protocol }}://{{ _SERVER.SERVER_NAME }}";
	    axios.defaults.baseURL = baseURL;
	    axios.interceptors.request.use(function(config) {
	        if (config.url && !config.url.match(/^https?:\/\//)) {
	            if (config.url.charAt(0) !== '/') {
	                config.url = '/' + config.url;
	            }
	        }
	        return config;
	    });
	    var originalHttpRequest = httpVueLoader.httpRequest;
	    httpVueLoader.httpRequest = function(url) {
	        if (url.charAt(0) === '/') { url = baseURL + url; }
	        return originalHttpRequest(url);
	    };
	})();
	</script>

	<script type="text/javascript">
		const eventBus = new Vue();
	</script>
</head>

<body>
	<div id="app">
		{% block notification %} {% endblock %}
		<div class="container">
			{% block content %} {% endblock %}
			{% block footer %} {% endblock %}
		</div>
	</div>

{% block customVueLoader %}
<script>
	httpVueLoader.httpRequest = function(url) {
		const apppath = window.location.pathname.split("/");
		const originAppPath = window.location.href+'/../../../'+apppath[1];
		const componentPath = url.split('/');
		const originComponent = originAppPath + `/vue/${componentPath[componentPath.length-1]}`;
		return axios.get(originComponent)
				.then(function(res) {
					if (res.data !== "") {
						return res.data;
					} else {
						return axios.get(url)
								.then(function (res) { return res.data; })
								.catch(function (err) { return Promise.reject(err.status); })
					}
				})
				.catch(function(err) {
					return axios.get(url)
							.then(function (res) { return res.data; })
							.catch(function (err) { return Promise.reject(err.status); })
				});
	}
</script>
{% endblock %}

<script>
  new Vue({
	{% block js %}
	    el: '#app',
	    components: {
	    {% for component in components %}
	        {% for item in component %}
	       '{{ item.tag }}': httpVueLoader('{{ webroot }}/{{ item.pageID }}/vue/{{ item.component }}'),
		   {% endfor %}
	    {% endfor %}
	    },
	{% endblock %}
  });
</script>

{% block externalJS %}

{% endblock %}

</body>
</html>
